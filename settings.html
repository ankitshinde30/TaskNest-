<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskNest Settings</title>

  <link rel="stylesheet" href="css/dashboard.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

  <div class="neu-card p-4">

    <h3 class="mb-4">Settings ⚙️</h3>

    <!-- THEME -->
    <div class="mb-3">
      <h6>Theme</h6>
      <button class="neu-btn" onclick="toggleTheme()">Toggle Dark Mode 🌙</button>
    </div>

    <!-- CLEAR DATA -->
    <div class="mb-3">
      <h6>Data Control</h6>
      <button class="neu-btn" onclick="clearData()">Clear All Data 🗑</button>
    </div>

    <!-- EXPORT -->
    <div class="mb-3">
      <h6>Export Data</h6>
      <button class="neu-btn" onclick="exportData()">Export JSON 📁</button>
    </div>

    <!-- LOGOUT -->
    <div class="mb-3">
      <h6>Account</h6>
      <button class="neu-btn" onclick="logout()">Logout 🚪</button>
    </div>

  </div>

</div>
<div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
<script src="js/settings.js"></script>
</body>
</html>
