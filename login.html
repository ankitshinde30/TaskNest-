<div class="neu-card p-4" style="width:350px;">
  <h3 class="text-center mb-3">Login</h3>

  <input type="email" id="loginEmail" class="neu-input w-100 mb-3" placeholder="Email">
  <input type="password" id="loginPassword" class="neu-input w-100 mb-3" placeholder="Password">

  <button class="neu-btn w-100" onclick="login()">Login</button>
</div>

<script>
function login() {
  const stored = JSON.parse(localStorage.getItem("tasknest_user"));
  const email = document.getElementById("loginEmail").value;
  const pass = document.getElementById("loginPassword").value;

  if (stored && stored.email === email && stored.password === pass) {
    alert("Login Successful");
    window.location.href = "index.html";
  } else {
    alert("Invalid credentials");
  }
}
</script>
